<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: rgb(0, 0, 0);
      margin: 0;
    }

    #webgl {
      pointer-events: none;
    }

    #ui-app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #ui {
      position: absolute;
      overflow: hidden;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #monitor-videos {
      pointer-events: none;
      position: 'absolute';
      opacity: 0;
      width: 0;
      height: 0;
      top: 0;
      left: 0;

    }

    #css {
      cursor: pointer;
    }

    #ui-interactive {
      position: absolute;
      top: 0;
      left: 0;
      width: 256px;
    }

    video {
      position: absolute;
      top: 0;
      pointer-events: none;
    }
  </style>

  <!-- Primary Meta Tags -->
  <title>Atal Sureka - Portfolio</title>
  <meta name="title" content="Atal Sureka - Full Stack Engineer">
  <meta name="description"
    content="I'm Atal, a Full Stack Engineer based in Boston, MA. MS in Information Technology from Clark University. Specializing in Python, TypeScript, React, FastAPI, and AI/ML.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Atal Sureka - Full Stack Engineer">
  <meta property="og:description"
    content="I'm Atal, a Full Stack Engineer based in Boston, MA. MS in Information Technology from Clark University. Specializing in Python, TypeScript, React, FastAPI, and AI/ML.">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta name="twitter:card" content="summary_large_image">

  <meta property="twitter:title" content="Atal Sureka - Full Stack Engineer">
  <meta name="twitter:title" content="Atal Sureka - Full Stack Engineer">

  <meta property="twitter:description"
    content="I'm Atal, a Full Stack Engineer based in Boston, MA. MS in Information Technology from Clark University. Specializing in Python, TypeScript, React, FastAPI, and AI/ML.">
  <meta name="twitter:description"
    content="I'm Atal, a Full Stack Engineer based in Boston, MA. MS in Information Technology from Clark University. Specializing in Python, TypeScript, React, FastAPI, and AI/ML.">

  <link rel="shortcut icon" href="../static/images/favicon.ico" type="image/x-icon">
</head>

<body>
  <div id="css"></div>
  <div id="webgl"></div>
  <div id="overlay"></div>
  <div id="ui-interactive"></div>
  <div id="ui"></div>
</body>

</html>
